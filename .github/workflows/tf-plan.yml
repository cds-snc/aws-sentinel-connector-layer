name: Terraform plan
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "layer/**"
      - "terraform/**"
      - ".github/workflows/tf-plan.yml"
env:
  AWS_REGION: ca-central-1
  TERRAFORM_VERSION: 1.0.3
  TERRAGRUNT_VERSION: 0.31.1
  CONFTEST_VERSION: 0.27.0
  TF_VAR_lambda_list_layers_assume_principals: ${{ secrets.LAMBDA_LIST_LAYERS_ASSUME_PRINCIPALS }}

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  terraform-plan:
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: terraform

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform Tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0

      - name: Configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ffc08eae7350b1061d7de219e2135c75561fb680 # master
        with:
          role-to-assume: arn:aws:iam::283582579564:role/aws-sentinel-connector-layer-plan
          role-session-name: SentinelGitHubActions
          aws-region: "ca-central-1"

      - name: Build layer
        working-directory: layer
        run: |
          make build

      - name: Terraform Plan ${{ matrix.module }}
        uses: cds-snc/terraform-plan@39b0058bcf977fbd8b067b84d5a9f6165e356c32 # v3.7.0
        with:
          comment-delete: true
          comment-title: Plan for ${{ matrix.module }}
          directory: ./${{ matrix.module }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          terragrunt: true
